name: Qualidade

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, tipos, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o código
        uses: actions/checkout@v6

      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Auditar dependências de produção
        run: npm audit --omit=dev --audit-level=moderate

      - name: Verificar lint
        run: npm run lint

      - name: Verificar tipos
        run: npm run typecheck

      - name: Executar testes
        run: npm test

      - name: Gerar build de produção
        run: npm run build

  database:
    name: Migrações, RLS e integridade
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o código
        uses: actions/checkout@v6

      - name: Preparar Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Iniciar banco local e aplicar migrações
        run: supabase db start

      - name: Validar schema e políticas
        env:
          PGPASSWORD: postgres
        run: psql postgresql://postgres@127.0.0.1:54322/postgres --set ON_ERROR_STOP=1 --file supabase/tests/schema_verification.sql

      - name: Executar testes transacionais
        env:
          PGPASSWORD: postgres
        run: psql postgresql://postgres@127.0.0.1:54322/postgres --set ON_ERROR_STOP=1 --file supabase/tests/integration.sql

      - name: Validar catálogo versionado
        env:
          PGPASSWORD: postgres
        run: psql postgresql://postgres@127.0.0.1:54322/postgres --set ON_ERROR_STOP=1 --file supabase/tests/catalog_seed_verification.sql
